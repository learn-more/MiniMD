name: Build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download premake5
        shell: pwsh
        run: |
          $url = "https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile premake5.zip
          Expand-Archive premake5.zip -DestinationPath premake5
          Add-Content $env:GITHUB_PATH (Resolve-Path premake5)

      - name: Generate project files
        run: premake5 vs2022

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild MiniMD.sln /m /p:Configuration=${{ matrix.configuration }} /p:Platform=x64
