name: Build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add premake5 to path
        shell: bash
        run: echo "${{ github.workspace }}/vendor/premake5" >> $GITHUB_PATH

      - name: Generate project files
        run: premake5 vs2022

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild MiniMD.sln /m /p:Configuration=${{ matrix.configuration }} /p:Platform=x64

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    needs: windows
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add premake5 to path
        shell: bash
        run: echo "${{ github.workspace }}/vendor/premake5" >> $GITHUB_PATH

      - name: Generate project files
        run: premake5 vs2022

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild MiniMD.sln /m /p:Configuration=Release /p:Platform=x64

      - name: Package
        run: 7z a ..\..\..\MiniMD-x64.zip .\MiniMD.exe
        working-directory: bin\Release-windows-x86_64\MiniMD

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: MiniMD-x64.zip
